<style>
  :root{
    --cream:#FAF9F5;
    --surface:#F0EEE6;
    --surface-2:#FFFFFF;
    --terracotta:#D97757;
    --terracotta-dark:#BD5F3F;
    --ink:#3D3929;
    --muted:#87867F;
    --line:#E5E2D9;
    --line-strong:#D8D4C8;
    --danger:#B5483A;
    --radius:14px;
    --radius-sm:8px;
    --shadow:0 1px 2px rgba(61,57,41,0.06), 0 4px 14px rgba(61,57,41,0.07);
    --font-display:'Iowan Old Style','Palatino Linotype','Georgia',serif;
    --font-ui:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:var(--font-ui);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--terracotta); outline-offset:2px;}

  /* ---------- App shell ---------- */
  .app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--cream);
    border-bottom:1px solid var(--line);
    padding:14px 16px 12px;
  }
  .topbar-row{display:flex;align-items:center;gap:10px;}
  .brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
  .brand-name{
    font-family:var(--font-display);
    font-size:22px;
    letter-spacing:0.2px;
    font-weight:600;
    color:var(--ink);
    white-space:nowrap;
  }
  .icon-btn{
    width:38px;height:38px;border-radius:999px;border:1px solid var(--line);
    background:var(--surface-2); display:flex;align-items:center;justify-content:center;
    cursor:pointer; flex:none; color:var(--ink);
    transition:background .15s ease, transform .1s ease;
  }
  .icon-btn:hover{background:var(--surface);}
  .icon-btn:active{transform:scale(0.94);}
  .icon-btn.primary{background:var(--terracotta); border-color:var(--terracotta); color:#fff;}
  .icon-btn.primary:hover{background:var(--terracotta-dark);}

  main{flex:1; padding:14px 16px 90px; -webkit-touch-callout:none;}

  /* ---------- Search ---------- */
  .search-wrap{position:relative; margin-top:12px;}
  .search-wrap svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); pointer-events:none;}
  .search-input{
    width:100%; padding:11px 38px 11px 38px; border-radius:999px;
    border:1px solid var(--line-strong); background:var(--surface-2);
    font-size:15px; color:var(--ink);
  }
  .search-input::placeholder{color:var(--muted);}
  .search-clear{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:28px;height:28px;border-radius:999px;border:none;background:transparent;
    color:var(--muted); cursor:pointer; display:none; align-items:center; justify-content:center;
  }
  .search-clear.show{display:flex;}
  .search-clear:hover{background:var(--line);}

  /* ---------- Quick filter pills ---------- */
  .pills{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; padding:12px 0 2px;}
  .pill{
    padding:6px 2px; border-radius:999px; border:1px solid var(--line-strong);
    background:var(--surface-2); color:var(--ink); font-size:11.5px; font-weight:500;
    cursor:pointer; white-space:nowrap; text-align:center;
    transition:all .12s ease; overflow:hidden; text-overflow:ellipsis;
  }
  .pill[data-active="true"]{
    background:var(--terracotta); border-color:var(--terracotta); color:#fff;
  }
  .pill:active{transform:scale(0.96);}

  /* ---------- Dropdown filter row ---------- */
  .filter-row{display:flex; gap:8px; margin-top:10px;}
  .select-wrap{position:relative; flex:1; min-width:0;}
  .select-wrap select{
    width:100%; appearance:none; -webkit-appearance:none;
    padding:9px 30px 9px 12px; border-radius:var(--radius-sm); border:1px solid var(--line-strong);
    background:var(--surface-2); color:var(--ink); font-size:13.5px; cursor:pointer;
  }
  .select-wrap::after{
    content:''; position:absolute; right:11px; top:50%; transform:translateY(-50%);
    width:8px;height:8px; border-right:1.6px solid var(--muted); border-bottom:1.6px solid var(--muted);
    transform:translateY(-65%) rotate(45deg); pointer-events:none;
  }

  .result-count{font-size:12.5px; color:var(--muted); margin:12px 2px 6px; letter-spacing:.2px;}

  /* ---------- Tea table ---------- */
  .tea-table{width:100%; border-collapse:collapse;}
  .tea-table thead th{
    text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--muted); font-weight:600; padding:8px 6px; border-bottom:1px solid var(--line);
    cursor:pointer; user-select:none; white-space:nowrap;
  }
  .tea-table thead th .arrow{display:inline-block; margin-left:3px; opacity:0; font-size:10px;}
  .tea-table thead th[data-sorted="true"] .arrow{opacity:1; color:var(--terracotta);}
  .tea-table thead th[data-sorted="true"]{color:var(--ink);}
  .tea-table tbody tr{cursor:pointer; transition:background .1s ease; -webkit-user-select:none; user-select:none;}
  .tea-table tbody td{-webkit-user-select:none; user-select:none;}
  .tea-table tbody tr:hover{background:var(--surface);}
  .tea-table tbody tr:active{background:var(--line);}
  .tea-table tbody td{padding:8px 6px; border-bottom:1px solid var(--line); font-size:14px; vertical-align:middle;}
  .col-name{font-weight:600; color:var(--ink); display:flex; align-items:center; gap:9px;}
  .list-thumb{
    flex:none; width:38px; height:38px; border-radius:8px; object-fit:cover;
    background:var(--surface); border:1px solid var(--line);
  }
  .list-thumb-placeholder{
    flex:none; width:38px; height:38px; border-radius:8px;
    background:var(--surface); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
  }
  .sorte-chip{
    display:inline-block; padding:3px 9px; border-radius:999px; font-size:12px; font-weight:500;
    background:var(--surface); border:1px solid var(--line-strong); white-space:nowrap;
  }
  .col-rating{white-space:nowrap;}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--muted);
  }
  .empty-state svg{margin-bottom:14px; opacity:.55;}
  .empty-state p{font-size:14.5px; margin:0; line-height:1.5;}
  .empty-state .empty-title{font-family:var(--font-display); font-size:19px; color:var(--ink); margin-bottom:6px;}

  /* ---------- Floating add button ---------- */
  .fab{
    position:fixed; bottom:24px; right:max(24px, calc(50vw - 380px + 24px));
    width:56px;height:56px;border-radius:999px; background:var(--terracotta); color:#fff;
    border:none; box-shadow:var(--shadow); display:flex;align-items:center;justify-content:center;
    cursor:pointer; z-index:30; transition:transform .12s ease, background .15s ease;
  }
  .fab:hover{background:var(--terracotta-dark);}
  .fab:active{transform:scale(0.93);}

  /* ===================== DETAIL VIEW ===================== */
  .detail-header{
    position:sticky; top:0; z-index:20; background:var(--cream);
    border-bottom:1px solid var(--line); padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .detail-header .spacer{flex:1;}

  .gallery{
    position:relative; width:100%; aspect-ratio:1/1; background:var(--surface);
    overflow:hidden; touch-action:pan-y;
  }
  .gallery-track{display:flex; height:100%; transition:transform .28s cubic-bezier(.22,.61,.36,1);}
  .gallery-slide{flex:none; width:100%; height:100%; display:flex; align-items:center; justify-content:center;}
  .gallery-slide img{width:100%; height:100%; object-fit:cover;}
  .gallery-empty{
    width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--muted); gap:8px;
  }
  .gallery-empty span{font-size:13px;}
  .gallery-dots{
    position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; gap:5px;
  }
  .gallery-dot{width:6px;height:6px;border-radius:999px; background:rgba(255,255,255,0.55);}
  .gallery-dot[data-active="true"]{background:#fff; width:16px; border-radius:4px;}
  .gallery-arrow{
    position:absolute; top:50%; transform:translateY(-50%); width:34px;height:34px;border-radius:999px;
    background:rgba(255,255,255,0.85); border:none; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--ink); box-shadow:var(--shadow);
  }
  .gallery-arrow.left{left:10px;}
  .gallery-arrow.right{right:10px;}
  .gallery-add{
    position:absolute; top:10px; right:10px; width:36px;height:36px;border-radius:999px;
    background:rgba(255,255,255,0.9); border:none; display:flex;align-items:center;justify-content:center;
    cursor:pointer; color:var(--ink); box-shadow:var(--shadow);
  }

  .thumb-strip{display:flex; gap:8px; padding:10px 16px; overflow-x:auto; scrollbar-width:none;}
  .thumb-strip::-webkit-scrollbar{display:none;}
  .thumb{
    position:relative; flex:none; width:56px;height:56px; border-radius:10px; overflow:hidden;
    border:2px solid transparent; cursor:pointer; background:var(--surface);
  }
  .thumb img{width:100%;height:100%;object-fit:cover; display:block;}
  .thumb[data-current="true"]{border-color:var(--terracotta);}
  .thumb-main-badge{
    position:absolute; top:2px; left:2px; background:var(--terracotta); border-radius:999px;
    width:16px;height:16px; display:flex;align-items:center;justify-content:center;
  }
  .thumb-del{
    position:absolute; top:2px; right:2px; background:rgba(61,57,41,0.65); border-radius:999px;
    width:16px;height:16px; display:flex;align-items:center;justify-content:center; border:none; color:#fff; cursor:pointer;
  }
  .thumb-set-main{
    position:absolute; bottom:2px; left:2px; right:2px; background:rgba(61,57,41,0.65);
    color:#fff; font-size:8.5px; text-align:center; border-radius:4px; padding:1px 0; border:none; cursor:pointer;
  }

  .detail-body{padding:18px 16px 40px;}
  .name-input{
    width:100%; border:none; background:transparent; font-family:var(--font-display);
    font-size:28px; font-weight:600; color:var(--ink); padding:0 0 6px; line-height:1.2;
  }
  .name-input::placeholder{color:var(--muted); font-weight:400;}
  .name-underline{height:1px; background:var(--line); margin-bottom:18px;}

  .card{background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
  .field{margin-bottom:16px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block; font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:600; margin-bottom:6px;}
  .field input[type=text], .field select, .field textarea{
    width:100%; padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--line-strong);
    background:var(--cream); color:var(--ink); font-size:14.5px;
  }
  .field textarea{resize:vertical; min-height:80px; line-height:1.45;}
  .field-row{display:flex; gap:12px;}
  .field-row .field{flex:1;}

  .stars{display:flex; gap:3px; align-items:center;}

  .danger-zone{margin-top:24px; text-align:center;}
  .btn-delete{
    background:none; border:1px solid var(--line-strong); color:var(--danger);
    padding:10px 18px; border-radius:999px; font-size:13.5px; cursor:pointer;
  }
  .btn-delete:hover{background:rgba(181,72,58,0.07); border-color:var(--danger);}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:var(--cream); padding:9px 18px; border-radius:999px;
    font-size:13px; opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease; z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .view{display:none;}
  .view[data-active="true"]{display:block;}

  /* ---------- Confirm modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(61,57,41,0.45);
    display:none; align-items:center; justify-content:center; z-index:60; padding:20px;
  }
  .modal-backdrop.show{display:flex;}
  .modal-card{
    background:var(--surface-2); border-radius:var(--radius); padding:22px 20px 18px;
    max-width:320px; width:100%; box-shadow:var(--shadow); text-align:center;
    transform:scale(0.94); opacity:0; transition:transform .16s ease, opacity .16s ease;
  }
  .modal-backdrop.show .modal-card{transform:scale(1); opacity:1;}
  .modal-icon{
    width:42px;height:42px;border-radius:999px; background:rgba(181,72,58,0.1);
    display:flex;align-items:center;justify-content:center; margin:0 auto 12px;
  }
  .modal-title{font-family:var(--font-display); font-size:18px; margin:0 0 6px; color:var(--ink); font-weight:600;}
  .modal-message{font-size:13.5px; color:var(--muted); line-height:1.5; margin:0 0 18px;}
  .modal-actions{display:flex; gap:10px;}
  .modal-btn{flex:1; padding:10px; border-radius:999px; font-size:14px; font-weight:600; cursor:pointer; border:1px solid var(--line-strong); transition:background .12s ease;}
  .modal-btn-cancel{background:var(--surface-2); color:var(--ink);}
  .modal-btn-cancel:hover{background:var(--surface);}
  .modal-btn-confirm{background:var(--danger); border-color:var(--danger); color:#fff;}
  .modal-btn-confirm:hover{background:#9c3c30;}

  /* Edit button sticky at bottom */
  .btn-edit-wrap{
    padding:24px 16px 40px; text-align:center;
  }
  .btn-edit{
    background:var(--terracotta); color:#fff; border:none;
    padding:13px 32px; border-radius:999px; font-size:15px; font-weight:600;
    cursor:pointer; box-shadow:var(--shadow); pointer-events:auto;
    transition:background .15s ease, transform .1s ease;
  }
  .btn-edit:hover{background:var(--terracotta-dark);}
  .btn-edit:active{transform:scale(0.96);}

  /* Star button on gallery */
  .gallery-star{
    position:absolute; top:10px; left:52px; width:36px; height:36px; border-radius:999px;
    background:rgba(255,255,255,0.9); border:none; display:none; align-items:center;
    justify-content:center; cursor:pointer; box-shadow:var(--shadow);
  }
  .gallery-star.is-main svg path{fill:#D97757; stroke:#D97757;}

    /* ---------- Read-only field values ---------- */
  .view-value{
    width:100%; padding:10px 12px; border-radius:var(--radius-sm);
    border:1px solid var(--line-strong); background:var(--cream);
    color:var(--ink); font-size:14.5px; min-height:42px;
    display:flex; align-items:center;
  }

    /* ---------- Save indicator pill ---------- */
  .save-pill{
    display:none; align-items:center; gap:5px;
    padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600;
    cursor:pointer; border:none; white-space:nowrap; flex:none;
    transition:background .15s ease, opacity .15s ease;
  }
  .save-pill.no-file{
    background:#FFF3CD; color:#856404; border:1px solid #FFECAB;
    animation:pill-pulse 2s ease-in-out infinite;
  }
  .save-pill.has-file{
    display:none !important;
  }
  .save-pill.saving{opacity:.6;}
  @keyframes pill-pulse{0%,100%{opacity:1;}50%{opacity:.65;}}

    @media (min-width:540px){
    .filter-row{flex-wrap:nowrap;}
  }
</style>

<script>
(function(){
  "use strict";

  /* ============================================================
     KONSTANTEN
  ============================================================ */
  const TEESORTEN = ["Weiß","Grün","Gelb","Oolong","Schwarz","Dunkel","Kräuter"];
  const HERKUNFTSLAENDER = ["China","Japan","Taiwan","Vietnam","Thailand","Sonstige"];
  const STATUS_OPTIONS = ["Gekauft","Getrunken","Leer"];
  const DB_NAME = "teadrunk_db";
  const DB_VERSION = 2;
  const MAX_PHOTO_DIM = 800; // px, Skalierung beim Upload
  function getFileName(){
    const d = new Date();
    const jj = String(d.getFullYear()).slice(-2);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const tt = String(d.getDate()).padStart(2,'0');
    return `teadrunk_${jj}${mm}${tt}.json`;
  }

  let db = null;
  let _fileHandle = null;   // FileSystemFileHandle, survives restart via IDB
  let _saveTimer = null;

  /* ============================================================
     INDEXEDDB LAYER (primary runtime store + file handle storage)
  ============================================================ */
  function openDB(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const _db = e.target.result;
        if(!_db.objectStoreNames.contains("teas")){
          const teaStore = _db.createObjectStore("teas", {keyPath:"id", autoIncrement:true});
          teaStore.createIndex("name", "name", {unique:false});
        }
        if(!_db.objectStoreNames.contains("photos")){
          const photoStore = _db.createObjectStore("photos", {keyPath:"id", autoIncrement:true});
          photoStore.createIndex("teaId", "teaId", {unique:false});
        }
        // meta store: holds fileHandle and other app-level keys
        if(!_db.objectStoreNames.contains("meta")){
          _db.createObjectStore("meta");
        }
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(db); };
      req.onerror = (e) => reject(e.target.error);
    });
  }

  // Generic meta key/value helpers (used for fileHandle persistence)
  function idbMetaGet(key){
    return new Promise((resolve, reject) => {
      const req = db.transaction("meta","readonly").objectStore("meta").get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  function idbMetaSet(key, value){
    return new Promise((resolve, reject) => {
      const req = db.transaction("meta","readwrite").objectStore("meta").put(value, key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
  function idbMetaDel(key){
    return new Promise((resolve, reject) => {
      const req = db.transaction("meta","readwrite").objectStore("meta").delete(key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  function tx(storeNames, mode){
    return db.transaction(storeNames, mode);
  }

  function dbGetAll(storeName){
    return new Promise((resolve, reject) => {
      const store = tx([storeName], "readonly").objectStore(storeName);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbGet(storeName, id){
    return new Promise((resolve, reject) => {
      const req = tx([storeName], "readonly").objectStore(storeName).get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbPut(storeName, obj){
    return new Promise((resolve, reject) => {
      const req = tx([storeName], "readwrite").objectStore(storeName).put(obj);
      req.onsuccess = () => { scheduleSaveToFile(); resolve(req.result); };
      req.onerror = () => reject(req.error);
    });
  }

  function dbDelete(storeName, id){
    return new Promise((resolve, reject) => {
      const req = tx([storeName], "readwrite").objectStore(storeName).delete(id);
      req.onsuccess = () => { scheduleSaveToFile(); resolve(); };
      req.onerror = () => reject(req.error);
    });
  }

  function dbGetPhotosForTea(teaId){
    return new Promise((resolve, reject) => {
      const store = tx(["photos"], "readonly").objectStore("photos");
      const idx = store.index("teaId");
      const req = idx.getAll(teaId);
      req.onsuccess = () => resolve(req.result.sort((a,b)=>(a.order||0)-(b.order||0)));
      req.onerror = () => reject(req.error);
    });
  }

  /* ============================================================
     FILE SYSTEM ACCESS LAYER  (UNCR-style)
  ============================================================ */

  // --- Save indicator pill ---
  function updateSavePill(){
    const pill = document.getElementById("save-pill");
    const importBtn = document.getElementById("btn-import-json");
    if(!pill) return;
    if(_fileHandle){
      pill.textContent = "💾 " + (_fileHandle.name || FILE_NAME);
      pill.className = "save-pill has-file";
      pill.style.display = "inline-flex";
  
    } else {
      pill.textContent = "💾 Tippen";
      pill.className = "save-pill no-file";
      pill.style.display = "inline-flex";
  
    }
  }

  // --- Serialize entire DB to JSON ---
  async function serializeDB(){
    const teas = await dbGetAll("teas");
    const photos = await dbGetAll("photos");
    return JSON.stringify({ version:1, exportedAt: Date.now(), teas, photos });
  }

  // --- Write to file (debounced) ---
  function scheduleSaveToFile(){
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(saveToFile, 400);
  }

  async function saveToFile(){
    if(!_fileHandle) return;
    try{
      const perm = await _fileHandle.queryPermission({mode:"readwrite"});
      if(perm !== "granted"){
        const req = await _fileHandle.requestPermission({mode:"readwrite"});
        if(req !== "granted"){ updateSavePill(); return; }
      }
      const pill = document.getElementById("save-pill");
      if(pill) pill.classList.add("saving");
      const writable = await _fileHandle.createWritable();
      await writable.write(await serializeDB());
      await writable.close();
      if(pill) pill.classList.remove("saving");
    } catch(err){
      console.warn("File write failed:", err);
      // Handle revoked: forget bad handle
      if(err.name === "NotAllowedError" || err.name === "SecurityError"){
        _fileHandle = null;
        await idbMetaDel("fileHandle").catch(()=>{});
        updateSavePill();
      }
    }
  }

  // --- Load all data from JSON and write into IDB ---
  async function loadFromFile(file){
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!data || !Array.isArray(data.teas)) throw new Error("Ungültiges Format");

      // Clear existing IDB data
      const t1 = db.transaction(["teas","photos"],"readwrite");
      t1.objectStore("teas").clear();
      t1.objectStore("photos").clear();
      await new Promise((res,rej)=>{ t1.oncomplete=res; t1.onerror=()=>rej(t1.error); });

      // Re-insert teas
      if(data.teas.length){
        const t2 = db.transaction("teas","readwrite");
        const ts = t2.objectStore("teas");
        for(const tea of data.teas) ts.put(tea);
        await new Promise((res,rej)=>{ t2.oncomplete=res; t2.onerror=()=>rej(t2.error); });
      }

      // Re-insert photos
      if(data.photos && data.photos.length){
        const t3 = db.transaction("photos","readwrite");
        const ps = t3.objectStore("photos");
        for(const photo of data.photos) ps.put(photo);
        await new Promise((res,rej)=>{ t3.oncomplete=res; t3.onerror=()=>rej(t3.error); });
      }

      return true;
    } catch(err){
      console.error("loadFromFile error:", err);
      toast("⚠️ Datei konnte nicht geladen werden: " + err.message);
      return false;
    }
  }

  // --- Restore file handle from IDB on app start ---
  async function _restoreFileHandle(){
    try{
      const handle = await idbMetaGet("fileHandle");
      if(!handle) return false;

      // Verify permission (may need re-grant after restart)
      let perm = await handle.queryPermission({mode:"readwrite"});
      if(perm !== "granted"){
        perm = await handle.requestPermission({mode:"readwrite"});
      }
      if(perm !== "granted") return false;

      _fileHandle = handle;

      // Read file and load data into IDB
      const file = await handle.getFile();
      const ok = await loadFromFile(file);
      if(ok){
        toast("✓ Daten aus " + handle.name + " geladen");
      }
      return ok;
    } catch(err){
      console.warn("_restoreFileHandle failed:", err);
      _fileHandle = null;
      return false;
    }
  }

  // --- Auto-setup: called when user taps the pill ---
  async function autoSetupFile(){
    if(!window.showSaveFilePicker){
      toast("⚠️ File System Access nicht verfügbar – nutze JSON-Export als Backup");
      return;
    }
    try{
      const handle = await window.showSaveFilePicker({
        suggestedName: getFileName(),
        types:[{ description:"JSON", accept:{"application/json":[".json"]} }],
        excludeAcceptAllOption: true
      });
      _fileHandle = handle;
      await idbMetaSet("fileHandle", handle);
      await saveToFile();
      updateSavePill();
      toast("✓ Auto-Speicher aktiv – jede Änderung wird sofort gespeichert");
    } catch(err){
      if(err && err.name !== "AbortError") toast("Fehler: " + err.message);
    }
  }

  /* ============================================================
     STATE
  ============================================================ */
  let allTeas = [];          // cache aller Tees aus DB
  let currentTeaId = null;   // aktuell offener Tee in Detail-View
  let currentPhotos = [];    // Fotos des aktuell offenen Tees
  let currentSlide = 0;      // aktueller Galerie-Index

  let state = {
    search: "",
    sorte: new Set(), // aktive Quickfilter (Multiselect)
    herkunft: "",
    status: "",
    sortKey: "name",
    sortDir: "asc"
  };

  /* ============================================================
     HELPERS
  ============================================================ */
  function toast(msg){
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(el._t);
    el._t = setTimeout(()=>el.classList.remove("show"), 1800);
  }

  function showConfirm(title, message, confirmLabel){
    return new Promise((resolve) => {
      const backdrop = document.getElementById("modal-backdrop");
      const confirmBtn = document.getElementById("modal-btn-confirm");
      const cancelBtn = document.getElementById("modal-btn-cancel");
      document.getElementById("modal-title").textContent = title;
      document.getElementById("modal-message").textContent = message;
      confirmBtn.textContent = confirmLabel || "Löschen";
      backdrop.classList.add("show");

      function cleanup(result){
        backdrop.classList.remove("show");
        confirmBtn.removeEventListener("click", onConfirm);
        cancelBtn.removeEventListener("click", onCancel);
        backdrop.removeEventListener("click", onBackdropClick);
        document.removeEventListener("keydown", onKeydown);
        resolve(result);
      }
      function onConfirm(){ cleanup(true); }
      function onCancel(){ cleanup(false); }
      function onBackdropClick(e){ if(e.target === backdrop) cleanup(false); }
      function onKeydown(e){ if(e.key === "Escape") cleanup(false); }

      confirmBtn.addEventListener("click", onConfirm);
      cancelBtn.addEventListener("click", onCancel);
      backdrop.addEventListener("click", onBackdropClick);
      document.addEventListener("keydown", onKeydown);
      confirmBtn.focus();
    });
  }

  function escapeHtml(str){

    options.forEach(opt => {

    let html = '<span style="display:inline-flex;gap:1px;vertical-align:middle;">';
    for(let i=1;i<=5;i++){

  function getFilteredSortedTeas(){
    let list = allTeas.slice();

    if(state.search.trim()){
      const q = state.search.trim().toLowerCase();
      list = list.filter(t => (t.name||"").toLowerCase().includes(q));
    }
    if(state.sorte.size){
      list = list.filter(t => state.sorte.has(t.teesorte));
    }
    if(state.herkunft){
      list = list.filter(t => t.herkunftsland === state.herkunft);
    }
    if(state.status){
      list = list.filter(t => t.status === state.status);
    }

    const dir = state.sortDir === "asc" ? 1 : -1;
    list.sort((a,b) => {
      let av, bv;
      if(state.sortKey === "bewertung"){
        av = a.bewertung||0; bv = b.bewertung||0;
        if(av === bv) return (a.name||"").localeCompare(b.name||"", "de");
        return (av - bv) * dir;
      } else if(state.sortKey === "teesorte"){
        av = a.teesorte||""; bv = b.teesorte||"";
        const c = av.localeCompare(bv, "de");
        if(c === 0) return (a.name||"").localeCompare(b.name||"", "de");
        return c * dir;
      } else {
        av = a.name||""; bv = b.name||"";
        return av.localeCompare(bv, "de") * dir;
      }
    });
    return list;
  }

  function renderPills(){
    const wrap = document.getElementById("pills-sorte");
    wrap.innerHTML = "";
    TEESORTEN.forEach(sorte => {
      const btn = document.createElement("button");
      btn.className = "pill";
      btn.textContent = sorte;
      btn.dataset.active = state.sorte.has(sorte) ? "true" : "false";
      btn.addEventListener("click", () => {
        if(state.sorte.has(sorte)) state.sorte.delete(sorte);
        else state.sorte.add(sorte);
        renderPills();
        renderList();
      });
      wrap.appendChild(btn);
    });
  }

  function renderSortHeaders(){

      th.dataset.sorted = isSorted ? "true" : "false";
      const arrow = th.querySelector(".arrow");
      arrow.textContent = (isSorted && state.sortDir === "desc") ? "▼" : "▲";

  async function exportToExcel(){
    const all = await dbGetAll("teas");
    if(!all.length){ toast("Keine Tees zum Exportieren"); return; }

    const XLSX = window.XLSX;
    if(!XLSX || !XLSX.utils){ toast("Exportfunktion nicht verfügbar"); return; }

    // Tabellenblatt: alle Tees
    const headers = ["Name","Originalname","Typ","Teesorte","Herkunftsland","Status","Note","Preis/kg (€)","Gekauft bei","Notizen","Erstellt","Aktualisiert"];
    const rows = all.map(t => [
      t.name||"",
      t.originalName||"",
      t.typ||"",
      t.teesorte||"",
      t.herkunftsland||"",
      t.status||"",
      t.bewertung||0,
      t.preis||0,
      t.gekauftBei||"",
      t.notizen||"",
      t.createdAt ? new Date(t.createdAt).toLocaleDateString("de-DE") : "",
      t.updatedAt ? new Date(t.updatedAt).toLocaleDateString("de-DE") : ""
    ]);

    const wsData = [headers, ...rows];
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // Spaltenbreiten
    ws["!cols"] = [
      {wch:28},{wch:20},{wch:18},{wch:12},{wch:14},{wch:12},{wch:11},
      {wch:12},{wch:22},{wch:40},{wch:12},{wch:14}
    ];

    // Headerzeile fett + Terrakotta-Hintergrund
    const headerRange = XLSX.utils.decode_range(ws["!ref"]);
    for(let C = headerRange.s.c; C <= headerRange.e.c; C++){
      const cell = ws[XLSX.utils.encode_cell({r:0, c:C})];
      if(!cell) continue;
      cell.s = {
        font:{ bold:true, color:{rgb:"FFFFFF"}, name:"Arial", sz:11 },
        fill:{ fgColor:{rgb:"D97757"}, patternType:"solid" },
        alignment:{ horizontal:"center", vertical:"center" }
      };
    }

    // Datenzellen: Schrift Arial 10pt
    for(let R = 1; R <= rows.length; R++){
      for(let C = headerRange.s.c; C <= headerRange.e.c; C++){
        const cell = ws[XLSX.utils.encode_cell({r:R, c:C})];
        if(!cell) continue;
        cell.s = {
          font:{ name:"Arial", sz:10 },
          alignment:{ wrapText: C===7, vertical:"top" }
        };
      }
    }

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Tees");

    // Statistik-Blatt
    const total = all.length;
    const bySort = {};
    TEESORTEN.forEach(s => bySort[s]=0);
    all.forEach(t=>{ if(t.teesorte) bySort[t.teesorte]=(bySort[t.teesorte]||0)+1; });
    const rated = all.filter(t=>t.bewertung>0);
    const avgRating = rated.length ? (rated.reduce((s,t)=>s+t.bewertung,0)/rated.length).toFixed(2) : "–";
    const byStatus = {};
    STATUS_OPTIONS.forEach(s=>byStatus[s]=0);
    all.forEach(t=>{ if(t.status) byStatus[t.status]=(byStatus[t.status]||0)+1; });

    const statsData = [
      ["Teadrunk – Statistik", ""],
      ["Exportiert am", new Date().toLocaleDateString("de-DE")],
      ["",""],
      ["Gesamt Tees", total],
      ["Ø Note", avgRating],
      ["",""],
      ["Nach Teesorte","Anzahl"],
      ...TEESORTEN.map(s=>[s, bySort[s]||0]),
      ["",""],
      ["Nach Status","Anzahl"],
      ...STATUS_OPTIONS.map(s=>[s, byStatus[s]||0])
    ];
    const ws2 = XLSX.utils.aoa_to_sheet(statsData);
    ws2["!cols"] = [{wch:22},{wch:12}];
    XLSX.utils.book_append_sheet(wb, ws2, "Statistik");

    const _d = new Date();
    const _dd = String(_d.getDate()).padStart(2,"0");
    const _mm = String(_d.getMonth()+1).padStart(2,"0");
    const _yy = String(_d.getFullYear()).slice(-2);
    const filename = "Teadrunk_Export_" + _yy + _mm + _dd + ".xlsx";
    XLSX.writeFile(wb, filename);
    toast("✓ Export: " + filename);
  }

  async function generateNextCode(){
    const teas = await dbGetAll("teas");
    const codes = teas
      .map(t => t.teaCode)
      .filter(c => c && /^TD\d+$/.test(c))
      .map(c => parseInt(c.replace("TD",""), 10));
    const max = codes.length ? Math.max(...codes) : 0;
    return "TD" + String(max + 1).padStart(3, "0");
  }

  /* ============================================================
     STAR WIDGET (0-5, halbe Schritte)
  ============================================================ */
  function starHalfSvg(i, value){
    const fill="#D97757", empty="#E5E2D9";
    let mode = value>=i ? "full" : value>=i-0.5 ? "half" : "empty";
    if(mode==="half"){
      const gid="sh"+i+Math.random().toString(36).slice(2);
      return `<svg viewBox="0 0 24 24"><defs><linearGradient id="${gid}" x1="0" x2="1" y1="0" y2="0"><stop offset="50%" stop-color="${fill}"/><stop offset="50%" stop-color="${empty}"/></linearGradient></defs><path d="M12 2 L14.9 8.6 L22 9.3 L16.7 14.1 L18.2 21.2 L12 17.5 L5.8 21.2 L7.3 14.1 L2 9.3 L9.1 8.6 Z" fill="url(#${gid})"/></svg>`;
    }
    return `<svg viewBox="0 0 24 24"><path d="M12 2 L14.9 8.6 L22 9.3 L16.7 14.1 L18.2 21.2 L12 17.5 L5.8 21.2 L7.3 14.1 L2 9.3 L9.1 8.6 Z" fill="${mode==="full"?fill:empty}"/></svg>`;
  }

  function renderStarWidget(value){
    const wrap = document.getElementById("stars-widget");
    if(!wrap) return;
    wrap.innerHTML = "";
    wrap.style.cssText = "display:flex;gap:3px;align-items:center;";
    for(let i=1;i<=5;i++){
      const btn = document.createElement("div");
      btn.style.cssText = "width:30px;height:30px;cursor:pointer;flex:none;";
      btn.innerHTML = starHalfSvg(i, value);
      btn.addEventListener("click", (e) => {
        const rect = btn.getBoundingClientRect();
        const isHalf = e.clientX - rect.left < rect.width/2;
        setCurrentRating(isHalf ? i-0.5 : i);
      });
      wrap.appendChild(btn);
    }
    const lbl = document.createElement("span");
    lbl.id = "star-rating-label";
    lbl.style.cssText = "margin-left:6px;font-size:13px;color:var(--muted);";
    lbl.textContent = value > 0 ? value.toFixed(1) : "–";
    wrap.appendChild(lbl);
  }

  
  async function setCurrentRating(val){
    val = Math.round(val * 2) / 2;
    val = Math.max(0, Math.min(5, val));
    renderStarWidget(val);
    if(!currentTeaId) return;
    const t = await dbGet("teas", currentTeaId);
    t.bewertung = val;
    t.updatedAt = Date.now();
    await dbPut("teas", t);
  }

  function updateGalleryStar(){
    const starBtn = document.getElementById("gallery-star-btn");
    if(!starBtn) return;
    if(currentPhotos.length === 0){ starBtn.style.display = "none"; return; }
    starBtn.style.display = "flex";
    if(currentSlide === 0){
      starBtn.classList.add("is-main");
      starBtn.title = "★ Hauptbild";
    } else {
      starBtn.classList.remove("is-main");
      starBtn.title = "Als Hauptbild setzen";
    }
  }

  function renderGallery(){
    const track = document.getElementById("gallery-track");
    const emptyEl = document.getElementById("gallery-empty");
    const dotsEl = document.getElementById("gallery-dots");
    const prevBtn = document.getElementById("gallery-prev");
    const nextBtn = document.getElementById("gallery-next");

    if(currentPhotos.length === 0){
      track.innerHTML = "";
      emptyEl.style.display = "flex";
      dotsEl.innerHTML = "";
      prevBtn.style.display = "none";
      nextBtn.style.display = "none";
      const delBtnE = document.getElementById("gallery-delete-btn");
      if(delBtnE) delBtnE.style.display = "none";
      const starBtnE = document.getElementById("gallery-star-btn");
      if(starBtnE) starBtnE.style.display = "none";
      return;
    }
    emptyEl.style.display = "none";
    prevBtn.style.display = currentPhotos.length>1 ? "flex" : "none";
    nextBtn.style.display = currentPhotos.length>1 ? "flex" : "none";
    const delBtn = document.getElementById("gallery-delete-btn");
    if(delBtn) delBtn.style.display = currentPhotos.length > 0 ? "flex" : "none";
    updateGalleryStar();

    track.innerHTML = currentPhotos.map(p => `<div class="gallery-slide"><img src="${p.dataURL}"></div>`).join("");
    dotsEl.innerHTML = currentPhotos.map((p,i)=>`<div class="gallery-dot" data-active="${i===currentSlide}"></div>`).join("");
    goToSlide(currentSlide, false);
  }

  function goToSlide(index, smooth){
    if(currentPhotos.length === 0) return;
    currentSlide = Math.max(0, Math.min(index, currentPhotos.length-1));
    const track = document.getElementById("gallery-track");
    track.style.transition = smooth === false ? "none" : "";
    track.style.transform = `translateX(-${currentSlide*100}%)`;
    if(smooth === false){
      requestAnimationFrame(()=>{ track.style.transition = ""; });
    }
    document.querySelectorAll(".gallery-dot").forEach((d,i)=> d.dataset.active = (i===currentSlide));
    updateGalleryStar();
  }

  function renderThumbStrip(){
    const strip = document.getElementById("thumb-strip");
    strip.innerHTML = "";
    currentPhotos.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "thumb";
      div.dataset.current = (i===currentSlide) ? "true" : "false";
      const isMain = (i===0);
      div.innerHTML = `
        <img src="${p.dataURL}">
        ${isMain ? `<div class="thumb-main-badge" title="Hauptbild"><svg width="9" height="9" viewBox="0 0 24 24" fill="#fff"><path d="M12 2 L14.9 8.6 L22 9.3 L16.7 14.1 L18.2 21.2 L12 17.5 L5.8 21.2 L7.3 14.1 L2 9.3 L9.1 8.6 Z"/></svg></div>` : ""}
        <button class="thumb-del" title="Löschen">
          <svg width="9" height="9" viewBox="0 0 24 24" stroke="#fff" stroke-width="3" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        ${!isMain ? `<button class="thumb-set-main">Als Hauptbild</button>` : ""}
      `;
      div.querySelector("img").addEventListener("click", () => goToSlide(i, true));
      div.querySelector(".thumb-del").addEventListener("click", (e) => { e.stopPropagation(); deletePhoto(i); });
      const setMainBtn = div.querySelector(".thumb-set-main");
      if(setMainBtn){
        setMainBtn.addEventListener("click", (e) => { e.stopPropagation(); setMainPhoto(i); });
      }
      strip.appendChild(div);
    });
  }

  async function setMainPhoto(index){
    const photo = currentPhotos[index];
    if(!photo) return;
    const [moved] = currentPhotos.splice(index,1);
    currentPhotos.unshift(moved);
    currentSlide = 0;
    const t = await dbGet("teas", currentTeaId);
    t.mainPhotoId = photo.id;
    t.updatedAt = Date.now();
    await dbPut("teas", t);
    renderGallery();
    toast("Hauptbild aktualisiert");
  }

  async function deletePhoto(index){
    const photo = currentPhotos[index];
    if(!photo) return;
    const ok = await showConfirm("Foto löschen?", "Dieses Foto wird endgültig entfernt.", "Löschen");
    if(!ok) return;
    await dbDelete("photos", photo.id);
    currentPhotos.splice(index,1);
    const t = await dbGet("teas", currentTeaId);
    if(t.mainPhotoId === photo.id){
      t.mainPhotoId = currentPhotos.length ? currentPhotos[0].id : null;
      await dbPut("teas", t);
    }
    currentSlide = Math.min(currentSlide, Math.max(0,currentPhotos.length-1));
    renderGallery();
  }

  function resizeImageFile(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        // If no resize needed, return directly
        const dataURL = e.target.result;
        if(!dataURL || !dataURL.startsWith('data:')) {
          reject(new Error('Invalid data URL'));
          return;
        }
        // Resize via canvas if image is too large
        const img = new Image();
        img.onload = () => {
          let w = img.width, hh = img.height;
          if(w <= MAX_PHOTO_DIM && hh <= MAX_PHOTO_DIM) {
            resolve(dataURL); // already small enough
            return;
          }
          if(w > hh){ hh = Math.round(hh * MAX_PHOTO_DIM/w); w = MAX_PHOTO_DIM; }
          else { w = Math.round(w * MAX_PHOTO_DIM/hh); hh = MAX_PHOTO_DIM; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = hh;
          canvas.getContext('2d').drawImage(img, 0, 0, w, hh);
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = () => resolve(dataURL); // if canvas fails, use original
        img.src = dataURL;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

    async function handlePhotoFiles(files){
    if(!currentTeaId || !files || !files.length) return;
    const fileList = Array.isArray(files) ? files : Array.from(files);
    const existing = await dbGetPhotosForTea(currentTeaId);
    let order = existing.length ? Math.max(...existing.map(p=>p.order||0))+1 : 0;
    for(const file of fileList){
      try{
        const dataURL = await resizeImageFile(file);
        const photoObj = {teaId: currentTeaId, dataURL, order: order++};
        const newId = await dbPut("photos", photoObj);
        photoObj.id = newId;
        currentPhotos.push(photoObj);
      } catch(err){ console.error("Foto-Fehler:", err); }
    }
    const t = await dbGet("teas", currentTeaId);
    if(!t.mainPhotoId && currentPhotos.length){
      t.mainPhotoId = currentPhotos[0].id;
      await dbPut("teas", t);
    }
    currentSlide = currentPhotos.length-1;
    renderGallery();
  }

  function setupGalleryEvents(){
    document.getElementById("gallery-prev").addEventListener("click", () => goToSlide(currentSlide-1, true));
    document.getElementById("gallery-next").addEventListener("click", () => goToSlide(currentSlide+1, true));
    document.getElementById("gallery-add").addEventListener("click", () => document.getElementById("photo-input").click());
    document.getElementById("gallery-star-btn").addEventListener("click", () => { if(currentPhotos.length > 0 && currentSlide !== 0) setMainPhoto(currentSlide); });
    document.getElementById("gallery-delete-btn").addEventListener("click", () => { if(currentPhotos.length > 0) deletePhoto(currentSlide); });
    document.getElementById("gallery-star-btn").addEventListener("click", () => { if(currentPhotos.length > 0 && currentSlide !== 0) setMainPhoto(currentSlide); });
    document.getElementById("photo-input").addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []);
      e.target.value = "";
      if(files.length) await handlePhotoFiles(files);
    });

    // Touch-Swipe
    const gallery = document.getElementById("gallery");
    let touchStartX = 0, touchDeltaX = 0, isSwiping = false;
    gallery.addEventListener("touchstart", (e) => {
      if(currentPhotos.length < 2) return;
      touchStartX = e.touches[0].clientX;
      isSwiping = true;
      document.getElementById("gallery-track").style.transition = "none";
    }, {passive:true});
    gallery.addEventListener("touchmove", (e) => {
      if(!isSwiping) return;
      touchDeltaX = e.touches[0].clientX - touchStartX;
      const track = document.getElementById("gallery-track");
      const base = -currentSlide*100;
      const pct = (touchDeltaX / gallery.clientWidth) * 100;
      track.style.transform = `translateX(${base + pct}%)`;
    }, {passive:true});
    gallery.addEventListener("touchend", () => {
      if(!isSwiping) return;
      isSwiping = false;
      const track = document.getElementById("gallery-track");
      track.style.transition = "";
      const threshold = gallery.clientWidth * 0.18;
      if(touchDeltaX < -threshold && currentSlide < currentPhotos.length-1){
        goToSlide(currentSlide+1, true);
      } else if(touchDeltaX > threshold && currentSlide > 0){
        goToSlide(currentSlide-1, true);
      } else {
        goToSlide(currentSlide, true);
      }
      touchDeltaX = 0;
    });
  }

  async function _seedIfEmpty(){
    const existing = await dbGetAll("teas");
    if(existing.length > 0) return;
    const t = db.transaction("teas","readwrite");
    const store = t.objectStore("teas");
    for(const tea of SEED_TEAS){ store.put(tea); }
    await new Promise((res,rej)=>{ t.oncomplete=res; t.onerror=()=>rej(t.error); });
    toast("✓ " + SEED_TEAS.length + " Tees geladen");
  }

      const text = await file.text();
      const data = JSON.parse(text);
      if(!data || !Array.isArray(data.teas)){
        toast("⚠️ Ungültige JSON-Datei");
        return;
      }

      // Clear existing data
      const t1 = db.transaction(["teas","photos"],"readwrite");
      t1.objectStore("teas").clear();
      t1.objectStore("photos").clear();
      await new Promise((res,rej)=>{ t1.oncomplete=res; t1.onerror=()=>rej(t1.error); });

      // Import teas
      if(data.teas.length){
        const t2 = db.transaction("teas","readwrite");
        const ts = t2.objectStore("teas");
        for(const tea of data.teas) ts.put(tea);
        await new Promise((res,rej)=>{ t2.oncomplete=res; t2.onerror=()=>rej(t2.error); });
      }

      // Import photos
      if(data.photos && data.photos.length){
        const t3 = db.transaction("photos","readwrite");
        const ps = t3.objectStore("photos");
        for(const photo of data.photos) ps.put(photo);
        await new Promise((res,rej)=>{ t3.oncomplete=res; t3.onerror=()=>rej(t3.error); });
      }

      await loadTeasAndRender();
      toast("✓ " + data.teas.length + " Tees geladen");
    } catch(err){
      console.error("JSON import error:", err);
      toast("⚠️ Fehler beim Laden: " + err.message);
    }
  }

  async function init(){
    try{
      await openDB();
    } catch(err){
      toast("Fehler beim Öffnen der Datenbank");
      console.error(err);
      return;
    }

    // Restore file handle and load data from JSON file (UNCR-style)
    if(window.showSaveFilePicker){
      await _restoreFileHandle();
    }

    // Seed with tea list data on first launch
    await _seedIfEmpty();

    renderPills();
    setupListEvents();
    setupDetailEvents();
    setupGalleryEvents();
    setupSavePill();
    updateSavePill();
    await loadTeasAndRender();
  }

  function setupSavePill(){
    const pill = document.getElementById("save-pill");
    if(pill) pill.addEventListener("click", autoSetupFile);
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(r) { console.log('SW:', r.scope); })
      .catch(function(e) { console.warn('SW fail:', e); });
  });
}
</script>
